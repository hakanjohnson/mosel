<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motorradtechnik Mosel</title>
  </head>

  <body>
    <header></header>
    <main>
      <section>
        <div class="info-text">
          <h3>Starte dein Projekt</h3>
          <p>
            Erzähl uns von deinem Motorrad un deinen Wünschen - wir erstellen
            dir ein Individuelles Angebot.
          </p>
        </div>
        <form id="kontakt" action="">
          <label>Vorname*</label>
          <input type="text" />
          <label>Nachname*</label>
          <input type="text" />
          <label for="">Telefon</label>
          <input type="tel" placeholder="+49 123 456789" />
          <label for="">E-Mail*</label>
          <input type="email" placeholder="deine@email.de" />
          <textarea placeholder="Deine Nachricht" cols="45" rows="8"></textarea>
          <button>Anfrage Senden</button>
        </form>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
