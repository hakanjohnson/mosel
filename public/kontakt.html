<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motorradtechnik Mosel</title>
    <link rel="stylesheet" href="public/core.css" />
    <link rel="stylesheet" href="public/components.css" />
  </head>

  <body>
    <header>
      <navigation>
        <div class="logo">
          <img src="/public/img/placeholder-square.jpg" alt="" width="30px" />
          <span>Motorradtechnik <br />Mosel</span>
        </div>
        <div class="navbar">
          <button id="menu-btn" class="burger" href="#">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
        <nav id="menu" class="menu">
          <ul>
            <li id="menu1"><a href="./index.html">Home</a></li>
            <li id="menu2"><a href="ueberuns.html">Über Uns</a></li>
            <li id="menu3"><a href="leistungen.html">Leistungen</a></li>
            <li id="menu4"><a href="public/kontakt.html">Kontakt</a></li>
          </ul>
        </nav>
      </navigation>
    </header>
    <main>
      <section>
        <div class="info-text">
          <h3>Starte dein</h3>
          <span class="info-text-color">Projekt</span>
          <p>
            Erzähl uns von deinem Motorrad und deinen Wünschen - wir erstellen
            dir ein Individuelles Angebot.
          </p>
        </div>
        <form id="kontakt" action="">
          <p>Deine Kontaktdaten</p>
          <label>Vorname </label>
          <input type="text" />
          <label>Nachname </label>
          <input type="text" />
          <label for="">Telefon </label>
          <input type="tel" placeholder="+49 123 456789" />
          <label for="">E-Mail </label>
          <input type="email" placeholder="max@mustermann.de" />
          <label for="textbox">Weitere Infos / Wünsche </label>
          <textarea
            id="textbox"
            placeholder="Deine Nachricht"
            cols="45"
            rows="8"></textarea>
          <button id="submit" type="submit">
            <img
              src="../public/img/send_40dp_FFFFFF_FILL0_wght400_GRAD0_opsz40.svg"
              alt=""
              width="24px" />Anfrage Senden
          </button>
        </form>
      </section>
    </main>
    <footer>
      <div class="copy">
        &#169; 2026 Motorradtechnik Mosel. Alle Rchte vorbehalten.
      </div>
      <div class="rechte">
        <span>Impressum</span>
        <span>Datenschutz</span>
      </div>
    </footer>
  </body>
  <script src="../main.js"></script>
</html>
